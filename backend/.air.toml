# .air.toml — Air hot-reload config for Go + Chi
root = "."
tmp_dir = "tmp"

[build]
  cmd        = "go build -o ./tmp/server ./cmd/server"
  bin        = "./tmp/server"
  full_bin   = "./tmp/server"
  include_ext = ["go", "tpl", "tmpl", "html"]
  exclude_dir = ["assets", "tmp", "vendor"]
  delay      = 500   # ms before rebuilding after a change

[log]
  time = false

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"

[misc]
  clean_on_exit = true
